id: openai_blog
track: A
kind: rss
endpoint: https://openai.com/blog/rss.xml
license_class: first_party
trust: 0.9
auto_publish_allowed: false
language: en
topics:
  - llm
  - product
  - research

fetch:
  interval: 6h
  etag: true
  timeout_sec: 30
  rate_limit: 60

extract:
  strategy: trafilatura

dedupe:
  key: canonical_url
  near_dup: simhash

post_rules:
  min_words: 400
  require_code_or_figure: false

enabled: true
